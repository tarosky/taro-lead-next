name: Playground Preview - Build

on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: Build Plugin ZIP
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'playground')
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Install dependencies and build
        run: |
          composer install --no-dev --prefer-dist
          npm ci
          npm run package

      - name: Create plugin ZIP
        run: |
          rsync -rc --exclude-from=.distignore ./ ./plugin-build/
          cd plugin-build && zip -r ../taro-lead-next.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playground-pr${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: taro-lead-next.zip
          if-no-files-found: error
          retention-days: 7
