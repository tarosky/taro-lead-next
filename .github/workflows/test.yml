name: Test Plugin

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: PHP UnitTest
    strategy:
      matrix:
        php: [ '7.4', '8.0' ]
        wp: [ 'latest', '6.6' ]
    uses: tarosky/workflows/.github/workflows/wp-unit-test.yml@main
    with:
      php_version: ${{ matrix.php }}
      wp_version: ${{ matrix.wp }}

  phpcs:
    name: PHP Syntax Check
    uses: tarosky/workflows/.github/workflows/phpcs.yml@main
    with:
      version: 7.4

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer run phpstan

  assets:
    name: Check Assets
    uses: tarosky/workflows/.github/workflows/npm.yml@main
    with:
      node_version: 22
      package: package

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build assets
        run: npm run package

      - name: Start wp-env
        run: npx wp-env start

      - name: Activate theme
        run: npx wp-env run tests-cli wp theme activate twentytwentyfive

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-results
          path: artifacts/
          retention-days: 7

  coverage:
    name: Code Coverage
    needs: [ test ]
    uses: tarosky/workflows/.github/workflows/wp-unit-test.yml@main
    with:
      php_version: '8.0'
      wp_version: latest
      coverage: true

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [test, phpcs, phpstan, assets, e2e]
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
